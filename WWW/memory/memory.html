<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>memory — FairPlay</title>
  <link rel="stylesheet" href="../common.css">

  <!-- PWA -->
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#14161a">
  <link rel="icon" href="../favicon.svg">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <script src="../app.js"></script>
  <script>FairPlay.registerSW("../sw.js");</script>

  <style>
    #memory_stage { display: flex; flex-direction: column; padding: .5rem; gap: .6rem; }
    #memory_hud { display: flex; align-items: baseline; justify-content: center; gap: 1.2rem; }
    #memory_pairs { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    #memory_score { font-size: 1rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    #memory_board { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
    .card {
      aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
      border-radius: .55rem; font-size: 2rem; line-height: 1;
      cursor: pointer; -webkit-user-select: none; user-select: none;
      transition: transform .15s, opacity .3s, background .15s, border-color .15s;
    }
    .card.down { background: linear-gradient(135deg, #2b3550, #1c2439); border: 1px solid var(--line); }
    .card.up { background: var(--bar-bg); border: 1px solid var(--accent); }
    .card.matched { opacity: 0; pointer-events: none; transform: scale(.85); }
  </style>
</head>
<body>
  <div id="app_frame">
    <!-- 置顶栏:空壳,内容由 topbar.js 注入(唯一来源) -->
    <header id="app_topbar"></header>

    <main id="memory_stage"></main>
  </div>

  <!-- 版本号 + 通用编码模块 + 本游戏邀请码编解码 -->
  <script src="../version.js"></script>
  <script src="../pack.js"></script>
  <script src="memory.invcode.js"></script>
  <!-- 先通用置顶栏文本,再游戏专属文本 -->
  <script src="../index.lang.js"></script>
  <script src="memory.lang.js"></script>
  <!-- 图标雪碧图 + 置顶栏内容注入(在 applyI18n 翻译之前) -->
  <script src="../assets/icons.js"></script>
  <script src="../topbar.js"></script>
  <script>FairPlay.applyI18n();</script>
  <!-- 通用结果页 + 游戏逻辑 -->
  <script src="../result.js"></script>
  <script src="memory.js"></script>
</body>
</html>
