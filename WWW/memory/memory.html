<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>memory — FairPlay</title>
  <link rel="stylesheet" href="../common.css">

  <!-- PWA -->
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#14161a">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <script src="../app.js"></script>
  <script>FairPlay.registerSW("../sw.js");</script>

  <style>
    #stage { display: flex; flex-direction: column; padding: .5rem; gap: .6rem; }
    #hud { display: flex; align-items: baseline; justify-content: center; gap: 1.2rem; }
    #pairs { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    #score { font-size: 1rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    #board { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
    .card {
      aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
      border-radius: .55rem; font-size: 2rem; line-height: 1;
      cursor: pointer; -webkit-user-select: none; user-select: none;
      transition: transform .15s, opacity .3s, background .15s, border-color .15s;
    }
    .card.down { background: linear-gradient(135deg, #2b3550, #1c2439); border: 1px solid var(--line); }
    .card.up { background: var(--bar-bg); border: 1px solid var(--accent); }
    .card.matched { opacity: 0; pointer-events: none; transform: scale(.85); }
  </style>
</head>
<body>
  <div id="frame">
    <header id="topbar">
      <a class="logo" data-i18n="logo" href="../">FairPlay</a>
      <span class="nickname" data-i18n="nickname">Guest</span>
      <span class="spacer"></span>
      <button type="button" data-i18n="exit">Exit</button>
      <select aria-label="language"><option value="en">EN</option></select>
      <span class="version" id="ver"></span>
    </header>

    <main id="stage"></main>
  </div>

  <!-- 版本号 + 通用编码模块 + 本游戏邀请码编解码 -->
  <script src="../version.js"></script>
  <script src="../pack.js"></script>
  <script src="memory.invcode.js"></script>
  <!-- 先通用置顶栏文本,再游戏专属文本 -->
  <script src="../index.lang.en.js"></script>
  <script src="memory.lang.en.js"></script>
  <script>FairPlay.initTopbar();</script>
  <!-- 通用结果页 + 游戏逻辑 -->
  <script src="../result.js"></script>
  <script src="memory.js"></script>
</body>
</html>
