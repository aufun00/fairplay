<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FairPlay</title>
  <link rel="stylesheet" href="common.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#14161a">
  <link rel="icon" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <!-- 通用引导:注册 SW -->
  <script src="app.js"></script>
  <script>FairPlay.registerSW("sw.js");</script>

  <!-- UI 图标 sprite(内联注入,供 <use href="#id"> 引用) -->
  <script src="assets/icons.js"></script>

  <!-- 版本号(唯一来源)+ 通用编码模块 先加载 -->
  <script src="version.js"></script>
  <script src="pack.js"></script>
  <!-- 注册表先加载,路由器立即用;各游戏邀请码编解码 -->
  <script src="games.js"></script>
  <script src="match3/match3.invcode.js"></script>
  <script src="mathdoku/mathdoku.invcode.js"></script>
  <script src="memory/memory.invcode.js"></script>
  <script>
    /* ---- 路由器:邀请码 ?g=<id>&p=<param> → 在 window.GAMES 树里按 id 找游戏,
       由 key 推路径(key/key.html)+ 拼 cfg + p → 跳游戏;无 g / 找不到 = 显示主页 ---- */
    (function () {
      var q = new URLSearchParams(location.search);
      var g = q.get("g");
      if (!g || !window.GAMES) return;
      var id = +g, game = null;
      window.GAMES.forEach(function (l1) {
        l1.subs.forEach(function (l2) {
          l2.games.forEach(function (gm) { if (gm.id === id) game = gm; });
        });
      });
      if (!game) return;
      var url = game.key + "/" + game.key + ".html";
      if (game.cfg) url += "?c=" + encodeURIComponent(game.cfg);
      var p = q.get("p");
      if (p != null) url += (url.indexOf("?") >= 0 ? "&" : "?") + "p=" + encodeURIComponent(p);
      location.replace(url);
    })();
  </script>

  <style>
    /* ---- 主页专属样式(画框/置顶栏在 common.css) ---- */
    #hm_content{ flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; }
    .block{ padding:.75rem; border-bottom:1px solid var(--line); }

    /* invite:一行 = 左 QR(方形)+ 中 invfields(param/memo)+ 右 Share(与 QR 等大方形)。
       与下方 #hm_history 视觉相连:去掉本块下分隔线与下内边距 */
    #hm_invite{ display:flex; gap:.75rem; align-items:flex-start; border-bottom:0; padding-bottom:0; }
    #hm_invite .qr{
      flex:0 0 auto; position:relative; overflow:hidden;
      border:1px solid var(--line); border-radius:.5rem;
      display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:.8rem;
    }
    /* QR 渲染层:选中邀请后画入二维码 canvas;无选中时显示占位 .qr-code */
    #hm_invite .qr .qr-render{ position:absolute; inset:0; display:none; }
    #hm_invite .qr.has-qr .qr-render{ display:block; }
    #hm_invite .qr.has-qr .qr-code{ display:none; }
    #hm_invite .qr .qr-render canvas{
      width:100%; height:100%; display:block;
      image-rendering:pixelated; object-fit:contain;   /* 缩放不糊,方形贴合 */
    }
    /* 点 QR → 放大弹窗(便于扫描):白底大二维码 + #code 标注 */
    .fp-card.qrbig{ gap:.6rem; }
    .fp-card.qrbig .qr-big{
      width:min(74vw, 320px); height:min(74vw, 320px);
      image-rendering:pixelated; display:block; border-radius:.4rem;
    }
    .fp-card.qrbig .qr-big-cap{ color:var(--muted); font-size:.9rem; text-align:center; font-variant-numeric:tabular-nums; }
    /* QR 长按 → 确认层:新标签打开游戏 */
    #hm_invite .qr .qr-open{
      position:absolute; inset:0; display:none;
      align-items:center; justify-content:center; text-align:center;
      background:var(--accent); color:#fff; border:none; border-radius:.5rem;
      font:inherit; font-size:.75rem; padding:.2rem; cursor:pointer;
    }
    #hm_invite .qr.confirm .qr-open{ display:flex; }
    /* invfields:param/memo 两行,居中占据 QR 与 Share 之间 */
    #hm_invite .invfields{ flex:1 1 auto; display:flex; flex-direction:column; gap:.35rem; min-width:0; }
    #hm_invite .invfields input{
      width:100%; background:var(--bg); color:var(--fg);
      border:1px solid var(--line); border-radius:.4rem;
      padding:.35rem .5rem; font:inherit;
    }
    #hm_invite .invfields .param{ color:var(--muted); }
    /* share:与 QR 等大的方形图标按钮(尺寸由 JS 同步),标准分享图标 */
    #hm_invite .share{
      flex:0 0 auto; padding:0; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--accent); color:#fff; border:none; border-radius:.5rem;
    }
    #hm_invite .share .ic{ width:1.75rem; height:1.75rem; }
    /* ---- L0 引导选择屏 & ③ browse 下钻:60% 宽居中 ---- */
    #hm_l0, #hm_browse{ width:60%; margin:0 auto; }
    @media (max-width:560px){ #hm_l0, #hm_browse{ width:100%; } }
    .onb-q{ font-size:1.05rem; color:var(--fg); text-align:center; margin:0 0 1rem; }
    .onb-btns{ display:flex; flex-direction:column; gap:.6rem; }
    .onb-btns button, .bc-opts .opt{
      display:block; width:100%; text-align:left;
      background:var(--bar-bg); color:var(--fg); border:1px solid var(--line);
      border-radius:.5rem; padding:.7rem .8rem; font:inherit; cursor:pointer;
    }
    .onb-btns button:hover, .bc-opts .opt:hover{ border-color:var(--accent); }

    /* ③ 面包屑:根/已选层级 chip,横排;点 chip 回该层 */
    .bc-crumbs{ display:flex; flex-wrap:wrap; gap:.4rem; }
    .bc-chip{
      background:transparent; color:var(--accent); border:1px solid var(--accent);
      border-radius:.5rem; padding:.3rem .6rem; font:inherit; cursor:pointer;
    }
    #hm_browse hr{ border:0; border-top:1px solid var(--line); margin:.7rem 0; }
    .bc-opts{ display:flex; flex-direction:column; gap:.5rem; }
    /* browse 层选项 = 游戏按钮时:图标 + 名/描述(复用观感) */
    .bc-opts .opt.game{ display:flex; align-items:center; gap:.6rem; }
    .bc-opts .opt .ic{ width:1.6rem; height:1.6rem; flex:0 0 auto; }
    .bc-opts .opt .ginfo{ display:flex; flex-direction:column; min-width:0; }
    .bc-opts .opt .gname{ font-size:.95rem; color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bc-opts .opt .gd{ font-size:.78rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ① history:邀请历史,3 列 × n 行网格 */
    #hm_history{ display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; }
    #hm_history .pi-empty{ grid-column:1/-1; color:var(--muted); font-size:.8rem; }
    /* PickInv 条目:图标 + 末4位 + 备注/创建时刻 */
    #hm_history .pi-item{
      position:relative;
      display:flex; flex-direction:column; align-items:center; gap:.1rem;
      background:var(--bar-bg); color:var(--fg); border:1px solid var(--line);
      border-radius:.5rem; padding:.4rem; font:inherit; cursor:pointer;
      -webkit-user-select:none; user-select:none;
    }
    #hm_history .pi-item.sel{ border-color:var(--accent); }
    #hm_history .pi-item .pi-icon{ font-size:1.4rem; line-height:1.2; }
    #hm_history .pi-item .pi-icon .ic{ width:1.4rem; height:1.4rem; }
    #hm_history .pi-item .pi-l1{ font-size:.7rem; color:var(--fg); }
    #hm_history .pi-item .pi-l2{
      font-size:.62rem; color:var(--muted);
      max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    /* 长按删除确认:卡面浮出居中 🗑️,再点一次确认删除;点别处取消 */
    #hm_history .pi-item .pi-del{
      position:absolute; inset:0; display:none;
      align-items:center; justify-content:center; font-size:1.4rem;
      background:rgba(0,0,0,.45); border-radius:.5rem;
    }
    #hm_history .pi-item.confirm .pi-del{ display:flex; }

    /* ② recent:最近玩过的游戏,竖向 button 列表(图标 + 变体名);点 = 再开一局 */
    #hm_recent .rec-list{ display:flex; flex-direction:column; gap:.5rem; }
    #hm_recent .rec-empty{ color:var(--muted); font-size:.8rem; }
    #hm_recent .rec-item{
      display:flex; align-items:center; gap:.6rem; text-align:left; cursor:pointer;
      background:var(--bar-bg); color:var(--fg);
      border:1px solid var(--line); border-radius:.5rem; padding:.7rem .8rem; font:inherit;
    }
    #hm_recent .rec-item:hover{ border-color:var(--accent); }
    #hm_recent .rec-item .ic{ width:1.6rem; height:1.6rem; flex:0 0 auto; }
    #hm_recent .rec-item .gname{ font-size:.95rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>

  <!-- ==================== DEBUG ONLY ====================
    调试用尺寸微调。URL 加 ?s=a,b,c(百分比,100=当前):
      a = history button 缩放%   b = recent button 缩放%   c = games 按钮高度%
    例:?s=150,120,130 。不带 s 或 DEBUG=false 时无任何影响。
    【正式发布前:把 DEBUG 改 false,或直接删除本块】 -->
  <script>
    (function () {
      var DEBUG = true;                 // ← 正式发布改 false(或删掉整块)
      if (!DEBUG) return;
      var s = new URLSearchParams(location.search).get("s");
      if (!s) return;
      var p = s.split(",").map(function (x) { return parseFloat(x); });
      var a = p[0], b = p[1], c = p[2], css = "";
      if (a > 0) css += "#hm_history .pi-item{ zoom:" + (a / 100) + " !important; }\n";
      if (b > 0) css += "#hm_recent .rec-item{ zoom:" + (b / 100) + " !important; }\n";
      if (c > 0) css += ".matrix .game{ height:" + (4.19 * c / 100).toFixed(3) + "rem !important; }\n";
      if (!css) return;
      var st = document.createElement("style"); st.id = "dbg_scale"; st.textContent = css;
      document.head.appendChild(st);
      console.log("[DEBUG] s=" + s + "  a(hist)=" + a + "% b(rec)=" + b + "% c(game-h)=" + c + "%");
    })();
  </script>
</head>
<body>
  <div id="app_frame">
    <!-- 置顶栏(占位,先不实现) -->
    <!-- 置顶栏:空壳,内容由 topbar.js 注入(唯一来源) -->
    <header id="app_topbar"></header>

    <main id="hm_content">
      <!-- L0:引导选择屏(默认视图;logo 回此) -->
      <section id="hm_l0" class="block" hidden>
        <p class="onb-q" data-i18n="onb_q">Do you want to publish a challenge?</p>
        <div class="onb-btns">
          <button type="button" id="onb_existing" data-i18n="onb_existing">Reshare an existing challenge</button>
          <button type="button" id="onb_recent" data-i18n="onb_recent">Pick from recently played</button>
          <button type="button" id="onb_list" data-i18n="onb_list">Pick from the games list</button>
        </div>
      </section>

      <!-- ① invite 视图:QR(跨2行) + param/memo/Share -->
      <section id="hm_invite" class="block" hidden>
        <div class="qr">
          <div class="qr-render"></div>
          <span class="qr-code">QR</span>
          <button type="button" class="qr-open" data-i18n="qr_open">↗ New tab</button>
        </div>
        <div class="invfields">
          <input class="param" type="text" readonly placeholder="—">
          <input class="memo" type="text" data-i18n-ph="memo_ph" placeholder="memo">
        </div>
        <button type="button" class="share" data-i18n-aria="share_btn" aria-label="Share invite">
          <svg class="ic" aria-hidden="true"><use href="#ic_share"/></svg>
        </button>
      </section>

      <!-- ① invite 视图第二部分:history(3 列网格) -->
      <section id="hm_history" class="block" hidden>
        <div class="pi-empty" data-i18n="pick_empty">No invites yet</div>
      </section>

      <!-- ② recent 视图:最近玩过的游戏(按钮列表,点 = 再发一局) -->
      <section id="hm_recent" class="block" hidden>
        <div class="rec-list" id="hm_recent_row"></div>
      </section>

      <!-- ③ browse 视图:面包屑逐级下钻(L1 时长 → L2 类型 → 游戏),内容由 renderBrowse 生成 -->
      <section id="hm_browse" class="block" hidden></section>
    </main>
  </div>

  <!-- 主页语言包(含通用置顶栏文本) -->
  <script src="index.lang.js"></script>
  <!-- 各游戏语言包(home 渲染 L3 的 名/说明 用,inf 键在里面) -->
  <script src="match3/match3.lang.js"></script>
  <script src="mathdoku/mathdoku.lang.js"></script>
  <script src="memory/memory.lang.js"></script>
  <!-- 置顶栏内容注入(在 applyI18n 翻译之前) -->
  <script src="topbar.js"></script>
  <!-- QR 库(生成邀请二维码) -->
  <script src="assets/qr.js"></script>
  <script>
    (function () {
      var lang = window.FairPlay.getLang();
      var L = (window.I18N && window.I18N[lang]) || {};
      var catalog = window.GAMES || [];
      var codecs = window.FAIRPLAY_CODECS || {};
      var base = location.origin + location.pathname;   // 邀请码基址(不含 query)

      /* 置顶栏:i18n 文本 + 占位符 + 版本号 */
      window.FairPlay.applyI18n();

      /* ---- History(本地持久化)---- */
      var HKEY = "fairplay.history";
      function loadHistory() { try { return JSON.parse(localStorage.getItem(HKEY)) || []; } catch (e) { return []; } }
      function saveHistory() { try { localStorage.setItem(HKEY, JSON.stringify(history)); } catch (e) {} }
      var history = loadHistory();
      var selected = null;
      var pendingDelete = null;   // 待删确认的条目
      var lastLongPress = 0;      // 最近一次长按触发时刻(吞掉长按松手的那次 click)

      function inviteLink(item) {
        return base + "?g=" + item.gameId + "&p=" + encodeURIComponent(item.param);
      }

      var qrEl = document.querySelector("#hm_invite .qr");
      var qrOpenBtn = qrEl.querySelector(".qr-open");
      var paramEl = document.querySelector("#hm_invite .param");
      var memoEl = document.querySelector("#hm_invite .memo");

      /* QR 与 Share 都是正方形,边长 = 中间 invfields 高(跨 param/memo 2 行) */
      var invfields = document.querySelector("#hm_invite .invfields");
      var shareEl = document.querySelector("#hm_invite .share");
      function syncSquares() {
        var s = invfields.offsetHeight + "px";
        qrEl.style.width = s; qrEl.style.height = s;
        if (shareEl) { shareEl.style.width = s; shareEl.style.height = s; }
      }
      if (window.ResizeObserver) { new ResizeObserver(syncSquares).observe(invfields); }
      window.addEventListener("resize", syncSquares);

      /* 该条目的创建时刻文本(独立于 param,来自 entry.ts) */
      function entryTime(item) {
        if (!item.ts) return "";
        var d = new Date(item.ts);
        var p2 = function (n) { return String(n).padStart(2, "0"); };
        return p2(d.getHours()) + ":" + p2(d.getMinutes()) + ":" + p2(d.getSeconds()) + " " + (L.inv_created || "created");
      }
      /* PickInv 第二行 / 展示用标签:有 memo 显 memo,否则显创建时刻 */
      function entryLabel(item) { return item.memo || entryTime(item); }

      /* 选中条目 → 填 param(只读)/ memo / QR
         memo 有值→作为 value;无值→把创建时刻作为灰色 placeholder 提示 */
      /* 把邀请链接画成二维码渲染进 QR 框;text 空则清空并回到占位 */
      function renderQR(text) {
        var render = qrEl.querySelector(".qr-render");
        render.innerHTML = "";
        if (text && window.FairPlay && FairPlay.QR) {
          try { render.appendChild(FairPlay.QR.toCanvas(text, { ecc: "M" })); qrEl.classList.add("has-qr"); return; } catch (e) {}
        }
        qrEl.classList.remove("has-qr");
      }

      function selectEntry(item) {
        selected = item;
        pendingDelete = null;
        qrEl.classList.remove("confirm");
        paramEl.value = item.param;
        memoEl.value = item.memo || "";
        memoEl.placeholder = item.memo ? (L.memo_ph || "memo") : (entryTime(item) || (L.memo_ph || "memo"));
        renderQR(inviteLink(item));
        renderPickInv();
      }

      /* memo 编辑:input 改模型 + 就地更新选中卡片第二行(不重建,避免吃掉点击),change 存盘 */
      memoEl.addEventListener("input", function () {
        if (!selected) return;
        selected.memo = memoEl.value;
        var selL2 = document.querySelector("#hm_history .pi-item.sel .pi-l2");
        if (selL2) selL2.textContent = entryLabel(selected);
      });
      memoEl.addEventListener("change", function () { if (selected) saveHistory(); });

      /* 长按删除 */
      function attachLongPress(el, onLong) {
        var timer = null;
        var start = function () { timer = setTimeout(function () { timer = null; onLong(); }, 600); };
        var cancel = function () { if (timer) { clearTimeout(timer); timer = null; } };
        el.addEventListener("touchstart", start, { passive: true });
        el.addEventListener("touchend", cancel);
        el.addEventListener("touchmove", cancel);
        el.addEventListener("mousedown", start);
        el.addEventListener("mouseup", cancel);
        el.addEventListener("mouseleave", cancel);
        return function suppressClickIfHandled() { return timer === null; };
      }

      /* QR 长按 → 确认「新标签打开游戏」;确认按钮点击 = 用当前邀请码开新标签(离线入口) */
      attachLongPress(qrEl, function () {
        if (!selected) return;
        lastLongPress = Date.now();
        qrEl.classList.add("confirm");
      });
      qrOpenBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        if (Date.now() - lastLongPress < 500) return;   // 吞掉长按松手那次 click
        if (!selected) return;
        var g = findGame(selected.gameId);
        if (g) { var u = gamePlayUrl(g); u += (u.indexOf("?") >= 0 ? "&" : "?") + "p=" + encodeURIComponent(selected.param); window.open(u, "_blank"); }
        qrEl.classList.remove("confirm");
      });
      /* QR 短按 → 放大二维码弹窗(便于扫描) */
      qrEl.addEventListener("click", function () {
        if (Date.now() - lastLongPress < 500) return;    // 吞掉长按松手那次 click
        if (qrEl.classList.contains("confirm")) return;  // 确认态点击交给 qr-open 按钮
        if (selected) openQRModal(selected);
      });
      function openQRModal(item) {
        if (!(window.FairPlay && FairPlay.openModal && FairPlay.QR)) return;
        FairPlay.openModal({
          dismissible: true,
          cardClass: "qrbig",
          build: function (card) {
            var cv = null;
            try { cv = FairPlay.QR.toCanvas(inviteLink(item), { ecc: "M", quiet: 4, scale: 10 }); } catch (e) {}
            if (cv) { cv.className = "qr-big"; card.appendChild(cv); }
            var cap = document.createElement("div");
            cap.className = "qr-big-cap";
            cap.textContent = "#" + item.param.slice(-4);
            card.appendChild(cap);
          }
        });
      }
      /* 点别处取消 QR / 删除的确认态 */
      document.addEventListener("click", function (e) {
        if (Date.now() - lastLongPress < 500) return;
        if (qrEl.classList.contains("confirm") && !qrEl.contains(e.target)) qrEl.classList.remove("confirm");
        if (pendingDelete && !(e.target.closest && e.target.closest(".pi-item.confirm"))) { pendingDelete = null; renderPickInv(); }
      });

      /* 删除某条(供确认后调用):维持原来的重选/清空逻辑 */
      function deleteAt(idx) {
        var item = history[idx];
        var wasSel = (selected === item);
        history.splice(idx, 1);
        pendingDelete = null;
        saveHistory();
        if (wasSel && history.length) {
          selectEntry(history[Math.max(0, idx - 1)]);
        } else {
          if (wasSel) {                 /* 删空:清 param / memo / QR */
            selected = null;
            paramEl.value = "";
            memoEl.value = "";
            memoEl.placeholder = (L.memo_ph || "memo");
            renderQR(null);
          }
          renderPickInv();
        }
      }

      function renderPickInv() {
        var box = document.getElementById("hm_history");
        box.innerHTML = "";
        if (!history.length) {
          var e = document.createElement("div");
          e.className = "pi-empty";
          e.textContent = L.pick_empty || "No invites yet";
          box.appendChild(e);
          return;
        }
        history.forEach(function (item, idx) {
          var g = findGame(item.gameId) || {};
          var card = document.createElement("button");
          card.className = "pi-item" + (item === selected ? " sel" : "") + (item === pendingDelete ? " confirm" : "");

          var icon = document.createElement("div"); icon.className = "pi-icon"; icon.innerHTML = g.icon ? icoSvg(g.icon) : "🎮";
          var l1 = document.createElement("div"); l1.className = "pi-l1"; l1.textContent = item.param.slice(-4);
          var l2 = document.createElement("div"); l2.className = "pi-l2";
          l2.textContent = entryLabel(item);
          var del = document.createElement("div"); del.className = "pi-del"; del.textContent = "🗑️";
          card.appendChild(icon); card.appendChild(l1); card.appendChild(l2); card.appendChild(del);

          /* 长按 → 进入删除确认态(浮出 🗑️),不直接删 */
          attachLongPress(card, function () {
            pendingDelete = item;
            lastLongPress = Date.now();
            renderPickInv();
          });
          card.addEventListener("click", function () {
            if (Date.now() - lastLongPress < 500) return;              // 吞掉长按松手那次 click
            if (item === pendingDelete) { deleteAt(idx); return; }     // 确认态再点 = 删除
            pendingDelete = null;                                      // 点别的卡:取消待删并选中
            selectEntry(item);
          });
          box.appendChild(card);
        });
      }

      /* 点游戏(L3)= 开一局:codec.encode(cfg 空则不传)→ history 最前插一条 → 选中显 QR */
      function startRound(game) {
        var codec = codecs[game.key];
        var param = codec ? (game.cfg ? codec.encode(game.cfg) : codec.encode()) : String(Date.now());
        history.unshift({ gameId: game.id, param: param, memo: "", ts: Date.now() });
        saveHistory();
        selectEntry(history[0]);
        touchRecent(game.id);          // 更新最近玩过(去重提最前)
        showView("invite");            // 建完跳①(自动选中最新那条,已在 selectEntry)
      }

      /* ---- Recent(最近玩过的游戏;MRU:去重 + 提到最前 + 越界删尾;本地持久化)---- */
      var RKEY = "fairplay.recent";
      function loadRecent() { try { return JSON.parse(localStorage.getItem(RKEY)) || []; } catch (e) { return []; } }
      function saveRecent() { try { localStorage.setItem(RKEY, JSON.stringify(recent)); } catch (e) {} }
      var recent = loadRecent();

      /* 玩了某游戏:该 id 提到最前(已存在则先摘出),存盘后重渲染 */
      function touchRecent(gameId) {
        var i = recent.indexOf(gameId);
        if (i >= 0) recent.splice(i, 1);
        recent.unshift(gameId);
        saveRecent();
        renderRecent();
      }
      /* 渲染 recent:竖向 button 列表(图标 + 变体名);点 = 再发一局。
         空则显空态(区块显隐由 showView 管,不在此隐藏) */
      function renderRecent() {
        var box = document.getElementById("hm_recent_row");
        box.innerHTML = "";
        var before = recent.length;
        recent = recent.filter(function (id) { return findGame(id); });   // 注册表里没了的丢弃
        if (recent.length !== before) saveRecent();
        if (!recent.length) {
          var e = document.createElement("div"); e.className = "rec-empty";
          e.textContent = L.recent_empty || "No recent games";
          box.appendChild(e);
          return;
        }
        recent.forEach(function (id) {
          var g = findGame(id);
          var t = L[g.inf] || {};
          var b = document.createElement("button"); b.className = "rec-item";
          b.innerHTML = icoSvg(g.icon) + '<span class="gname"></span>';
          b.querySelector(".gname").textContent = t.name || g.key;
          b.addEventListener("click", function () { startRound(g); });
          box.appendChild(b);
        });
      }

      /* ---- games 树辅助(window.GAMES;没游戏的分类不显,避免死路)---- */
      function icoSvg(id) { return '<svg class="ic" aria-hidden="true"><use href="#ic_' + id + '"/></svg>'; }
      function l2Full(l2) { return l2.games && l2.games.length > 0; }
      function l1Full(l1) { return l1.subs.some(l2Full); }
      /* 在 window.GAMES 树里按 id 找游戏(history 图标 / QR 打开 / 路由都用) */
      function findGame(id) {
        for (var i = 0; i < catalog.length; i++)
          for (var j = 0; j < catalog[i].subs.length; j++) {
            var gs = catalog[i].subs[j].games;
            for (var k = 0; k < gs.length; k++) if (gs[k].id === id) return gs[k];
          }
        return null;
      }
      /* 游戏 → 启动 URL(key 推路径 + 有 cfg 拼 ?c);再由调用方 append p */
      function gamePlayUrl(game) {
        var url = game.key + "/" + game.key + ".html";
        if (game.cfg) url += "?c=" + encodeURIComponent(game.cfg);
        return url;
      }
      /* 分类文案(L.cat[key] = {name, desc});缺则回退 key */
      function catInfo(node) { return (L.cat && L.cat[node.key]) || {}; }

      /* ---- 视图状态机:l0 引导屏 / ① invite / ② recent / ③ browse ---- */
      var curView = "l0";
      function showView(name) {
        curView = name;
        document.getElementById("hm_l0").hidden = (name !== "l0");
        document.getElementById("hm_invite").hidden = (name !== "invite");
        document.getElementById("hm_history").hidden = (name !== "invite");
        document.getElementById("hm_recent").hidden = (name !== "recent");
        document.getElementById("hm_browse").hidden = (name !== "browse");
        if (name === "invite") {
          if (!selected && history.length) selectEntry(history[0]);   // 自动选中最新
          renderPickInv();
          syncSquares();
        } else if (name === "recent") {
          renderRecent();
        } else if (name === "browse") {
          bL1 = null; bL2 = null;                                     // 进入 = 回 L1
          renderBrowse();
        }
      }

      /* ---- ③ browse:面包屑逐级下钻(L1 时长 → L2 类型 → 游戏)---- */
      var bL1 = null, bL2 = null;
      function crumbChip(label, onClick) {
        var b = document.createElement("button"); b.className = "bc-chip";
        b.textContent = label; b.addEventListener("click", onClick);
        return b;
      }
      function renderBrowse() {
        var box = document.getElementById("hm_browse"); box.innerHTML = "";
        /* 面包屑:③根 → L1名 → L2名(点回该层) */
        var crumbs = document.createElement("div"); crumbs.className = "bc-crumbs";
        crumbs.appendChild(crumbChip(L.onb_list || "Games list", function () { bL1 = null; bL2 = null; renderBrowse(); }));
        if (bL1 != null) crumbs.appendChild(crumbChip(catInfo(catalog[bL1]).name || catalog[bL1].key, function () { bL2 = null; renderBrowse(); }));
        if (bL2 != null) crumbs.appendChild(crumbChip(catInfo(catalog[bL1].subs[bL2]).name || catalog[bL1].subs[bL2].key, function () { renderBrowse(); }));
        box.appendChild(crumbs);
        box.appendChild(document.createElement("hr"));
        var opts = document.createElement("div"); opts.className = "bc-opts";
        box.appendChild(opts);

        if (bL2 != null) {                                  // 最深层 = 游戏列表
          catalog[bL1].subs[bL2].games.forEach(function (game) {
            var t = L[game.inf] || {};
            var b = document.createElement("button"); b.className = "opt game";
            b.innerHTML = icoSvg(game.icon) + '<span class="ginfo"><span class="gname"></span><span class="gd"></span></span>';
            b.querySelector(".gname").textContent = t.name || game.key;
            b.querySelector(".gd").textContent = t.desc || "";
            b.addEventListener("click", function () { startRound(game); });
            opts.appendChild(b);
          });
        } else if (bL1 != null) {                           // L2 类型(只显有游戏的)
          catalog[bL1].subs.forEach(function (l2, j) {
            if (!l2Full(l2)) return;
            var b = document.createElement("button"); b.className = "opt";
            b.textContent = catInfo(l2).name || l2.key;
            b.addEventListener("click", function () { bL2 = j; renderBrowse(); });
            opts.appendChild(b);
          });
        } else {                                            // L1 时长(只显有游戏的),显 desc
          catalog.forEach(function (l1, i) {
            if (!l1Full(l1)) return;
            var c = catInfo(l1);
            var b = document.createElement("button"); b.className = "opt";
            b.textContent = c.desc || c.name || l1.key;
            b.addEventListener("click", function () { bL1 = i; bL2 = null; renderBrowse(); });
            opts.appendChild(b);
          });
        }
      }

      /* L0 三按钮 → 三条路 */
      document.getElementById("onb_existing").addEventListener("click", function () { showView("invite"); });
      document.getElementById("onb_recent").addEventListener("click", function () { showView("recent"); });
      document.getElementById("onb_list").addEventListener("click", function () { showView("browse"); });

      /* 分享按钮:拉起系统分享 "{nickname} invites you to play" + 邀请链接
         (无原生分享则复制文本) */
      document.querySelector("#hm_invite .share").addEventListener("click", function () {
        if (!selected) { alert(L.share_empty || "Pick or create an invite first"); return; }
        var nick = FairPlay.getNickname();
        var g = findGame(selected.gameId) || {};
        var gname = (g.inf && L[g.inf] && L[g.inf].name) || g.key || "";
        var line = (L.share_msg || "{nick} invites you to play {game} # {code}")
          .replace("{nick}", nick).replace("{game}", gname).replace("{code}", selected.param.slice(-4));
        /* 统一走 FairPlay.share(app.js):文本 + 链接(接收 App 一般渲染成"FairPlay"标题卡) */
        FairPlay.share(line, inviteLink(selected));
      });

      /* 语言就地切换:更新 L 引用 + 重渲染当前视图按 L 动态生成的部分
         (L0 静态文案由 applyI18n 走 data-i18n 处理) */
      window.addEventListener("fairplay:langchange", function () {
        L = (window.I18N && window.I18N[window.FairPlay.getLang()]) || {};
        if (curView === "invite") renderPickInv();
        else if (curView === "recent") renderRecent();
        else if (curView === "browse") renderBrowse();
      });

      showView("l0");
    })();
  </script>
</body>
</html>
