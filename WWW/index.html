<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FairPlay</title>
  <link rel="stylesheet" href="common.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#14161a">
  <link rel="icon" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <!-- 通用引导:注册 SW -->
  <script src="app.js"></script>
  <script>FairPlay.registerSW("sw.js");</script>

  <!-- UI 图标 sprite(供兜底 topbar 用) -->
  <script src="assets/icons.js"></script>

  <!-- 版本号 + 注册表(路由器按 id 找游戏推路径) -->
  <script src="version.js"></script>
  <script src="games.js"></script>
  <script>
    /* ==================== 纯路由器(本页几乎不显示)====================
       1) 邀请码 ?g=<id>&p=<code> → 用 FairCatalog.find 在 typed 树按 id 找游戏,推路径跳游戏。
       2) 无 g / 找不到 → 按 op_mode 分流到 index.<mode>.html(default new)。
          op_mode 为字符串,以后加 homepage mode 只需再放一个 index.<mode>.html。
       兜底:任何异常都回引导页 index.new.html。 */
    (function () {
      try {
        var q = new URLSearchParams(location.search);
        var g = q.get("g");
        if (g && window.FairCatalog) {
          var id = +g, game = FairCatalog.find(id);
          if (game) {
            /* 通过邀请码进游戏,也把该游戏计入本设备的 recent(收到分享链接来玩的人同样受益) */
            if (window.FairPlay && FairPlay.pushRecent) FairPlay.pushRecent(id);
            var url = game.key + "/" + game.key + ".html?g=" + game.id;   // ?g 定游戏
            var p = q.get("p");
            if (p != null) url += "&p=" + encodeURIComponent(p);          // p 内含时长+seed
            location.replace(url);
            return;
          }
        }
        var mode = (window.FairPlay && FairPlay.getOpMode) ? FairPlay.getOpMode() : "new";
        location.replace("index." + mode + ".html");
      } catch (e) {
        location.replace("index.new.html");
      }
    })();
  </script>
</head>
<body>
  <!-- 兜底:路由器同步跳转后本体几乎不显示;万一未跳转,仍有置顶栏(含 op_mode 开关)可用 -->
  <div id="app_frame">
    <header id="app_topbar"></header>
  </div>
  <script src="index.lang.js"></script>
  <script src="topbar.js"></script>
  <script>window.FairPlay && FairPlay.applyI18n && FairPlay.applyI18n();</script>
</body>
</html>
