<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>match3 — FairPlay</title>
  <link rel="stylesheet" href="../common.css">

  <!-- PWA -->
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#14161a">
  <link rel="icon" href="../favicon.svg">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <script src="../app.js"></script>
  <script>FairPlay.registerSW("../sw.js");</script>

  <style>
    #stage { display: flex; flex-direction: column; padding: .5rem; gap: .5rem; }
    #hud { display: flex; align-items: baseline; justify-content: center; gap: 1rem; }
    #clock { font-size: 2rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    #score { font-size: 1rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    #board {
      width: 100%; aspect-ratio: 1 / 1;
      display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px;
      background: var(--line); border: 1px solid var(--line);
      border-radius: .4rem; overflow: hidden;
    }
    .cell {
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); font-size: 1.5rem; line-height: 1;
      cursor: pointer; -webkit-user-select: none; user-select: none;
      transition: transform .1s, background .1s;
    }
    .cell.sel { background: #2b3550; transform: scale(.88); }
    @keyframes dropin { from { transform: translateY(-16px); opacity: 0; } to { transform: none; opacity: 1; } }
    #board.dropin .cell { animation: dropin .3s ease both; }
  </style>
</head>
<body>
  <div id="frame">
    <!-- 置顶栏(全站一致);logo 回主页 -->
    <!-- 置顶栏:空壳,内容由 topbar.js 注入(唯一来源) -->
    <header id="topbar"></header>

    <!-- 游戏区:除置顶栏外留空 -->
    <main id="stage"></main>
  </div>

  <!-- 版本号 + 通用编码模块 + 本游戏邀请码编解码(供复现棋盘用) -->
  <script src="../version.js"></script>
  <script src="../pack.js"></script>
  <script src="match3.invcode.js"></script>
  <!-- 先通用置顶栏文本,再游戏专属文本 -->
  <script src="../index.lang.js"></script>
  <script src="match3.lang.js"></script>
  <!-- 图标雪碧图 + 置顶栏内容注入(在 applyI18n 翻译之前) -->
  <script src="../assets/icons.js"></script>
  <script src="../topbar.js"></script>
  <script>FairPlay.applyI18n();</script>
  <!-- 通用结果页 + 游戏逻辑 -->
  <script src="../result.js"></script>
  <script src="match3.js"></script>
</body>
</html>
