<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>mathdoku — FairPlay</title>
  <link rel="stylesheet" href="../common.css">

  <!-- PWA -->
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#14161a">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <script src="../app.js"></script>
  <script>FairPlay.registerSW("../sw.js");</script>
</head>
<body>
  <div id="frame">
    <!-- 置顶栏(全站一致);logo 回主页 -->
    <header id="topbar">
      <a class="logo" data-i18n="logo" href="../">FairPlay</a>
      <span class="nickname" data-i18n="nickname">Guest</span>
      <span class="spacer"></span>
      <button type="button" data-i18n="exit">Exit</button>
      <select aria-label="language"><option value="en">EN</option></select>
      <span class="version" id="ver"></span>
    </header>

    <!-- 游戏区:除置顶栏外留空 -->
    <main id="stage"></main>
  </div>

  <!-- 版本号 + 通用置顶栏文本 + 游戏专属文本 -->
  <script src="../version.js"></script>
  <script src="../index.lang.js"></script>
  <script src="mathdoku.lang.js"></script>
  <script>FairPlay.initTopbar();</script>
</body>
</html>
