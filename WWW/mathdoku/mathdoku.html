<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>mathdoku — FairPlay</title>
  <link rel="stylesheet" href="../common.css">

  <!-- PWA -->
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#14161a">
  <link rel="icon" href="../favicon.svg">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <script src="../app.js"></script>
  <script>FairPlay.registerSW("../sw.js");</script>
</head>
<body>
  <div id="frame">
    <!-- 置顶栏(全站一致);logo 回主页 -->
    <!-- 置顶栏:空壳,内容由 topbar.js 注入(唯一来源) -->
    <header id="topbar"></header>

    <!-- 游戏区:除置顶栏外留空 -->
    <main id="stage"></main>
  </div>

  <!-- 版本号 + 通用置顶栏文本 + 游戏专属文本 -->
  <script src="../version.js"></script>
  <script src="../index.lang.js"></script>
  <script src="mathdoku.lang.js"></script>
  <!-- 图标雪碧图 + 置顶栏内容注入(在 applyI18n 翻译之前) -->
  <script src="../assets/icons.js"></script>
  <script src="../topbar.js"></script>
  <script>FairPlay.applyI18n();</script>
</body>
</html>
