<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Snake — FairPlay</title>
  <link rel="stylesheet" href="../common.css">

  <!-- PWA -->
  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#14161a">
  <link rel="icon" href="../favicon.svg">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <script src="../app.js"></script>
  <script>FairPlay.registerSW("../sw.js");</script>

  <style>
    /* Snake stage:居中方形棋盘;网格自适应 N×N(--n 由 JS 设);头/身/食物着色 */
    #snake_stage { display:flex; align-items:center; justify-content:center; padding:.6rem; }
    #snake_board {
      width:min(92vw, 26rem); aspect-ratio:1/1;
      display:grid; gap:2px; padding:4px;
      grid-template-columns:repeat(var(--n,15),1fr); grid-template-rows:repeat(var(--n,15),1fr);
      background:var(--line); border-radius:.5rem;
      touch-action:none; -webkit-user-select:none; user-select:none;
    }
    #snake_board .cell { background:rgba(127,127,127,.10); border-radius:2px; }
    #snake_board .cell.body { background:var(--accent); }
    #snake_board .cell.head { background:#2f7fd6; }         /* 头 = 稍深的蓝 */
    /* .cell.food 颜色由 JS 从 TYPES.food.color 设 */
  </style>
</head>
<body>
  <div id="app_frame">
    <header id="app_topbar"></header>
    <div id="app_control"></div>
    <main id="snake_stage" class="app_stage"></main>
  </div>

  <!-- 版本号 + 通用编码 -->
  <script src="../version.js"></script>
  <script src="../pack.js"></script>
  <!-- 注册表(游戏页按 ?g 查自己)-->
  <script src="../games.js"></script>
  <!-- 先通用置顶栏文本,再游戏专属文本 -->
  <script src="../index.lang.js"></script>
  <script src="snake.lang.js"></script>
  <!-- 图标雪碧图 + 置顶栏注入 -->
  <script src="../assets/icons.js"></script>
  <script src="../topbar.js"></script>
  <script>FairPlay.applyI18n();</script>
  <!-- 控制栏 + 游戏逻辑 -->
  <script src="../control.js"></script>
  <script src="../pad.js"></script>
  <script src="snake.js"></script>
</body>
</html>
