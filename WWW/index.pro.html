<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FairPlay</title>
  <link rel="stylesheet" href="common.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#14161a">
  <link rel="icon" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FairPlay">
  <!-- 通用引导:注册 SW -->
  <script src="app.js"></script>
  <script>FairPlay.registerSW("sw.js");</script>

  <!-- UI 图标 sprite(内联注入,供 <use href="#id"> 引用) -->
  <script src="assets/icons.js"></script>

  <!-- 版本号(唯一来源)+ 通用编码模块 先加载 -->
  <script src="version.js"></script>
  <script src="pack.js"></script>
  <!-- 注册表先加载,路由器立即用(seed 编解码统一在 pack.js:FairPack.encodeSeed/decodeSeed) -->
  <script src="games.js"></script>
  <script>
    /* ---- 路由器:邀请码 ?g=<id>&p=<code> → 用 FairCatalog.find 在 typed 树按 id 找游戏,
       由 key 推路径(key/key.html)+ 原样透传全部参数(p 时长+seed、o 对手成绩等)→ 跳游戏;无 g / 找不到 = 显示主页 ---- */
    (function () {
      var q = new URLSearchParams(location.search);
      var g = q.get("g");
      if (!g || !window.FairCatalog) return;
      var game = FairCatalog.find(+g);
      if (!game) return;
      /* 只换路径,query 原样全带(g=id、p、o 及将来新参数)*/
      location.replace(game.key + "/" + game.key + ".html?" + q.toString());
    })();
  </script>

  <style>
    /* ---- 主页专属样式(画框/置顶栏在 common.css) ---- */
    #hm_content{ flex:1 1 auto; min-height:0; overflow-y:auto; overflow-x:hidden; }
    .block{ padding:.75rem; border-bottom:1px solid var(--line); }

    /* invite:一行 = 左 QR(方形)+ 中 invfields(param/memo)+ 右 Share(与 QR 等大方形)。
       与下方 #hm_history 视觉相连:去掉本块下分隔线与下内边距 */
    #hm_invite{ display:flex; gap:.75rem; align-items:flex-start; border-bottom:0; padding-bottom:0; }
    #hm_invite .qr{
      flex:0 0 auto; position:relative; overflow:hidden;
      border:1px solid var(--line); border-radius:.5rem;
      display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:.8rem;
    }
    /* QR 渲染层:选中邀请后画入二维码 canvas;无选中时显示占位 .qr-code */
    #hm_invite .qr .qr-render{ position:absolute; inset:0; display:none; }
    #hm_invite .qr.has-qr .qr-render{ display:block; }
    #hm_invite .qr.has-qr .qr-code{ display:none; }
    #hm_invite .qr .qr-render canvas{
      width:100%; height:100%; display:block;
      image-rendering:pixelated; object-fit:contain;   /* 缩放不糊,方形贴合 */
    }
    /* 点 QR → 放大弹窗(便于扫描):白底大二维码 + #code 标注 */
    .fp-card.qrbig{ gap:.6rem; }
    .fp-card.qrbig .qr-big{
      width:min(74vw, 320px); height:min(74vw, 320px);
      image-rendering:pixelated; display:block; border-radius:.4rem;
    }
    .fp-card.qrbig .qr-big-cap{ color:var(--muted); font-size:.9rem; text-align:center; font-variant-numeric:tabular-nums; }
    /* QR 长按 → 确认层:新标签打开游戏 */
    #hm_invite .qr .qr-open{
      position:absolute; inset:0; display:none;
      align-items:center; justify-content:center; text-align:center;
      background:var(--accent); color:#fff; border:none; border-radius:.5rem;
      font:inherit; font-size:.75rem; padding:.2rem; cursor:pointer;
    }
    #hm_invite .qr.confirm .qr-open{ display:flex; }
    /* invfields:param/memo 两行,居中占据 QR 与 Share 之间 */
    #hm_invite .invfields{ flex:1 1 auto; display:flex; flex-direction:column; gap:.35rem; min-width:0; }
    #hm_invite .invfields input{
      width:100%; background:var(--bg); color:var(--fg);
      border:1px solid var(--line); border-radius:.4rem;
      padding:.35rem .5rem; font:inherit;
    }
    #hm_invite .invfields .param{ color:var(--muted); }
    /* share:与 QR 等大的方形图标按钮(尺寸由 JS 同步),标准分享图标 */
    #hm_invite .share{
      flex:0 0 auto; padding:0; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center;
      background:var(--accent); color:#fff; border:none; border-radius:.5rem;
    }
    #hm_invite .share .ic{ width:1.75rem; height:1.75rem; }
    /* history:邀请历史条,撑满整宽、横向滚动;.block 的 .75rem 下内边距即滚动条预留带,不压卡片。
       顶部内边距收窄,与上方 #hm_invite 贴合成一组 */
    #hm_history{
      display:flex; gap:.5rem; align-items:stretch;
      overflow-x:auto; overflow-y:hidden; scrollbar-width:thin;
      min-height:3.5rem; padding-top:.5rem;
    }
    #hm_history .pi-empty{ color:var(--muted); font-size:.8rem; align-self:center; }
    /* PickInv 条目:图标 + 末4位 + 备注/创建时刻 */
    #hm_history .pi-item{
      position:relative; flex:0 0 auto; width:4.5rem;
      display:flex; flex-direction:column; align-items:center; gap:.1rem;
      background:var(--bar-bg); color:var(--fg); border:1px solid var(--line);
      border-radius:.5rem; padding:.3rem; font:inherit; cursor:pointer;
      -webkit-user-select:none; user-select:none;
    }
    #hm_history .pi-item.sel{ border-color:var(--accent); }
    #hm_history .pi-item .pi-icon{ font-size:1.4rem; line-height:1.2; }
    #hm_history .pi-item .pi-icon .ic{ width:1.4rem; height:1.4rem; }
    /* 角标随图标缩放:pro bar 图标 1.4rem → .ic-wrap 字号同步(角标 em 基准) */
    #hm_history .pi-item .ic-wrap, #hm_recent .rec-item .ic-wrap{ font-size:1.4rem; }
    #hm_history .pi-item .pi-l1{ font-size:.7rem; color:var(--fg); }
    #hm_history .pi-item .pi-l2{
      font-size:.62rem; color:var(--muted);
      max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    /* 长按删除确认:卡面浮出居中 🗑️,再点一次确认删除;点别处取消 */
    #hm_history .pi-item .pi-del{
      position:absolute; inset:0; display:none;
      align-items:center; justify-content:center; font-size:1.4rem;
      background:rgba(0,0,0,.45); border-radius:.5rem;
    }
    #hm_history .pi-item.confirm .pi-del{ display:flex; }

    /* recent:最近玩过的游戏 MRU 图标行(去重/提最前/越界删尾);点 = 再开一局 */
    #hm_recent .rec-row{ display:flex; gap:.5rem; overflow:hidden; }
    #hm_recent .rec-item{
      flex:0 0 auto; padding:0; cursor:pointer;
      display:inline-flex; align-items:center; justify-content:center;
      width:4.5rem; height:4.19rem;                 /* = history 卡 4.5rem × 67px,图标居中 */
      background:var(--bar-bg); color:var(--fg);
      border:1px solid var(--line); border-radius:.5rem;
    }
    #hm_recent .rec-item .ic{ width:1.4rem; height:1.4rem; }   /* = history icon */

    /* games:游戏行竖列(每行 = 图标 + 名/说明 + 30/60 时长按钮;.grow/.dbtn 在 common.css) */
    #hm_games .glist{ display:flex; flex-direction:column; gap:.5rem; }
  </style>

</head>
<body>
  <div id="app_frame">
    <!-- 置顶栏(占位,先不实现) -->
    <!-- 置顶栏:空壳,内容由 topbar.js 注入(唯一来源) -->
    <header id="app_topbar"></header>

    <main id="hm_content">
      <!-- invite:QR(跨2行) + param/memo/Share -->
      <section id="hm_invite" class="block">
        <div class="qr">
          <div class="qr-render"></div>
          <span class="qr-code">QR</span>
          <button type="button" class="qr-open" data-i18n="qr_open">↗ New tab</button>
        </div>
        <div class="invfields">
          <input class="param" type="text" readonly placeholder="—">
          <input class="memo" type="text" data-i18n-ph="memo_ph" placeholder="memo">
        </div>
        <button type="button" class="share" data-i18n-aria="share_btn" aria-label="Share invite">
          <svg class="ic" aria-hidden="true"><use href="#ic_share"/></svg>
        </button>
      </section>

      <!-- history:邀请历史条(撑满整宽、横向滚动) -->
      <section id="hm_history" class="block">
        <div class="pi-empty" data-i18n="pick_empty">No invites yet</div>
      </section>

      <!-- recent:最近玩过的游戏(MRU 图标行,点 = 再开一局;无栏目文字);空则整块隐藏 -->
      <section id="hm_recent" class="block" hidden>
        <div class="rec-row" id="hm_recent_row"></div>
      </section>

      <!-- games:游戏行竖列(由 window.GAMES 平铺生成;每行含 30/60 时长按钮) -->
      <section id="hm_games" class="block">
        <div class="glist" id="hm_list"></div>
      </section>
    </main>
  </div>

  <!-- 主页语言包(含通用置顶栏文本) -->
  <script src="index.lang.js"></script>
  <!-- 各游戏语言包(home 渲染名/说明用,i18n 键 = 注册表 key) -->
  <script src="match3/match3.lang.js"></script>
  <script src="blockfit/blockfit.lang.js"></script>
  <script src="runner/runner.lang.js"></script>
  <script src="2048/2048.lang.js"></script>
  <script src="snake/snake.lang.js"></script>
  <!-- 置顶栏内容注入(在 applyI18n 翻译之前) -->
  <script src="topbar.js"></script>
  <!-- QR 库(生成邀请二维码) -->
  <script src="assets/qr.js"></script>
  <!-- 首页共享核心(new/pro 共用:状态/邀请/QR/分享/recent/startRound) -->
  <script src="home-core.js"></script>
  <script>
    (function () {
      /* 置顶栏:i18n 文本 + 占位符 + 版本号 */
      window.FairPlay.applyI18n();
      function getL() { return (window.I18N && window.I18N[window.FairPlay.getLang()]) || {}; }
      var L = getL();
      var catalog = window.GAMES || [];
      var pendingDelete = null;   // 待删确认的条目(pro 页专属:长按删除)

      /* 共享核心;本页保留自己的 grid history / icon-row recent / tab-矩阵 UI */
      var H = window.FairPlay.Home({
        getL: getL,
        base: location.origin + location.pathname.replace(/[^/]*$/, ""),   // 目录根,邀请链接命中路由器
        catalog: catalog,
        onHistory: renderPickInv,
        onRecent: renderRecent,
        onRoundStarted: function () {},                                    // pro 一屏,无需切视图
        onMemoInput: function (label) {
          var selL2 = document.querySelector("#hm_history .pi-item.sel .pi-l2");
          if (selL2) selL2.textContent = label;
        },
        onDocClick: function (e) {                                         // 点别处取消长按删除确认
          if (pendingDelete && !(e.target.closest && e.target.closest(".pi-item.confirm"))) { pendingDelete = null; renderPickInv(); }
        }
      });
      H.initInvite();

      /* ① history:3 列网格 · pi-item(长按 → 确认删除) */
      function renderPickInv() {
        var box = document.getElementById("hm_history");
        box.innerHTML = "";
        if (!H.history.length) {
          var e = document.createElement("div"); e.className = "pi-empty";
          e.textContent = L.pick_empty || "No invites yet"; box.appendChild(e); return;
        }
        H.history.forEach(function (item, idx) {
          var g = H.findGame(item.gameId) || {};
          var card = document.createElement("button");
          card.className = "pi-item" + (item === H.selected ? " sel" : "") + (item === pendingDelete ? " confirm" : "");
          var icon = document.createElement("div"); icon.className = "pi-icon"; icon.innerHTML = g.icon ? H.icoSvg(g.icon, H.entryBadge(item)) : "🎮";
          var l1 = document.createElement("div"); l1.className = "pi-l1"; l1.textContent = item.param.slice(-4);
          var l2 = document.createElement("div"); l2.className = "pi-l2"; l2.textContent = H.entryLabel(item);
          var del = document.createElement("div"); del.className = "pi-del"; del.textContent = "🗑️";
          card.appendChild(icon); card.appendChild(l1); card.appendChild(l2); card.appendChild(del);
          /* 长按 → 进入删除确认态(浮出 🗑️),不直接删 */
          H.attachLongPress(card, function () {
            pendingDelete = item; H.lastLongPress = Date.now(); renderPickInv();
          });
          card.addEventListener("click", function () {
            if (Date.now() - H.lastLongPress < 500) return;               // 吞掉长按松手那次 click
            if (item === pendingDelete) { pendingDelete = null; H.deleteAt(idx); return; }   // 确认态再点 = 删除
            pendingDelete = null;                                         // 点别的卡:取消待删并选中
            H.selectEntry(item);
          });
          box.appendChild(card);
        });
      }

      /* ② recent:图标行 · 每个最近游戏按 durs 摊成带角标图标(3/6),点 = 开该档一局。
         越界裁剪按「整局」(该游戏所有档一起)从尾部去。空则整块隐藏 */
      function paintRecent(box) {
        box.innerHTML = "";
        H.recent.forEach(function (id) {
          var g = H.findGame(id);
          (g.durs || [0]).forEach(function (secs, di) {
            var b = document.createElement("button"); b.className = "rec-item";
            b.innerHTML = H.icoSvg(g.icon, secs ? Math.round(secs / 10) : null);
            b.addEventListener("click", function () { H.startRound(g, di); });
            box.appendChild(b);
          });
        });
      }
      function renderRecent() {
        var sec = document.getElementById("hm_recent");
        var box = document.getElementById("hm_recent_row");
        var before = H.recent.length;
        H.recent = H.recent.filter(function (id) { return H.findGame(id); });
        if (H.recent.length !== before) H.saveRecent();
        if (!H.recent.length) { sec.hidden = true; box.innerHTML = ""; return; }
        sec.hidden = false;
        paintRecent(box);
        if (box.clientWidth) {                          // 越界:整局从尾部裁,重画
          var changed = false;
          while (H.recent.length > 1 && box.scrollWidth > box.clientWidth) { H.recent.pop(); paintRecent(box); changed = true; }
          if (changed) H.saveRecent();
        }
      }

      /* 游戏行(同 new 页):图标 + 名/说明 + 30/60 时长按钮(点 = 开该档一局) */
      function gameRow(game) {
        var t = H.gameInfo(game);
        var row = document.createElement("div"); row.className = "grow";
        row.innerHTML = H.icoSvg(game.icon) +
          '<span class="gc-info"><span class="gc-name"></span><span class="gc-sub"></span></span>' +
          '<span class="grow-durs"></span>';
        row.querySelector(".gc-name").textContent = t.name || game.key;
        row.querySelector(".gc-sub").textContent = t.desc || "";
        var durs = row.querySelector(".grow-durs");
        (game.durs || []).forEach(function (secs, di) {
          var b = document.createElement("button"); b.type = "button"; b.className = "dbtn";
          b.textContent = secs;
          b.addEventListener("click", function () { H.startRound(game, di); });
          durs.appendChild(b);
        });
        return row;
      }

      /* ---- games:平铺 typed 树 → 全部游戏行竖列 ---- */
      function renderGamesList() {
        var box = document.getElementById("hm_list"); box.innerHTML = "";
        H.allGames().forEach(function (game) { box.appendChild(gameRow(game)); });
      }

      /* 语言就地切换:更新 L 引用 + 重渲染按 L 动态生成的部分(游戏行、邀请条) */
      window.addEventListener("fairplay:langchange", function () {
        L = getL();
        renderGamesList();
        renderPickInv();
      });

      renderGamesList();
      renderPickInv();
      renderRecent();
      H.syncSquares();
    })();
  </script>
</body>
</html>
